<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MEINS!">
  <defs>
    <linearGradient id="mm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="mm-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#c81e1e"/>
    </linearGradient>
    <clipPath id="mm-band-clip">
      <rect width="300" height="40" rx="4" ry="4"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" fill="url(#mm-bg)"/>
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <text x="256" y="276" text-anchor="middle"
          textLength="400" lengthAdjust="spacingAndGlyphs"
          font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="900" font-size="146" letter-spacing="-2">
      <tspan fill="#ffffff">MEINS</tspan><tspan fill="url(#mm-red)">!</tspan>
    </text>
    <g transform="translate(106 314)" clip-path="url(#mm-band-clip)">
      <rect width="300" height="40" fill="#ffffff"/>
      <g fill="#0a0a0a">
        <rect x="0"   y="0"  width="25" height="20"/>
        <rect x="50"  y="0"  width="25" height="20"/>
        <rect x="100" y="0"  width="25" height="20"/>
        <rect x="150" y="0"  width="25" height="20"/>
        <rect x="200" y="0"  width="25" height="20"/>
        <rect x="250" y="0"  width="25" height="20"/>
        <rect x="25"  y="20" width="25" height="20"/>
        <rect x="75"  y="20" width="25" height="20"/>
        <rect x="125" y="20" width="25" height="20"/>
        <rect x="175" y="20" width="25" height="20"/>
        <rect x="225" y="20" width="25" height="20"/>
        <rect x="275" y="20" width="25" height="20"/>
      </g>
    </g>
  </g>
</svg>
