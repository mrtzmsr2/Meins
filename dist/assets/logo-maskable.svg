<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MEINS!">
  <defs>
    <linearGradient id="meins-bg-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="meins-accent-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffd84d"/>
    </linearGradient>
  </defs>
  <!-- Vollflaechiger Hintergrund (maskable safe zone ist 80% Mitte) -->
  <rect width="512" height="512" fill="url(#meins-bg-m)"/>
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <text x="256" y="290" text-anchor="middle"
          textLength="380" lengthAdjust="spacingAndGlyphs"
          font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-weight="900" font-size="138" letter-spacing="-1">
      <tspan fill="#ffffff">MEINS</tspan><tspan fill="url(#meins-accent-m)">!</tspan>
    </text>
    <rect x="106" y="326" width="300" height="12" rx="6" fill="url(#meins-accent-m)"/>
  </g>
</svg>
