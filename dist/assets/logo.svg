<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MEINS!">
  <defs>
    <linearGradient id="meins-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="meins-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#ffd84d"/>
    </linearGradient>
  </defs>

  <!-- App-Tile -->
  <rect width="512" height="512" rx="104" ry="104" fill="url(#meins-bg)"/>

  <!-- Wordmark - textLength fixiert die Breite auf 380px, "!" kann nicht abgeschnitten werden -->
  <text x="256" y="296" text-anchor="middle"
        textLength="380" lengthAdjust="spacingAndGlyphs"
        font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="900" font-size="138" letter-spacing="-1">
    <tspan fill="#ffffff">MEINS</tspan><tspan fill="url(#meins-accent)">!</tspan>
  </text>

  <!-- Akzentbalken in Markengelb -->
  <rect x="106" y="332" width="300" height="12" rx="6" fill="url(#meins-accent)"/>

  <!-- Tagline -->
  <text x="256" y="392" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="700" font-size="34" fill="#8a8a8a" letter-spacing="6">
    AUTOSPIEL
  </text>
</svg>
