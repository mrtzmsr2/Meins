<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MEINS!">
  <defs>
    <linearGradient id="m-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="m-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#c81e1e"/>
    </linearGradient>
    <linearGradient id="m-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="m-band-clip">
      <rect width="300" height="40" rx="4" ry="4"/>
    </clipPath>
  </defs>

  <!-- App-Tile -->
  <rect width="512" height="512" rx="104" ry="104" fill="url(#m-bg)"/>

  <!-- Glas-Reflex -->
  <rect x="32" y="32" width="448" height="180" rx="80" fill="url(#m-shine)"/>

  <!-- Innere Highlight-Kontur -->
  <rect x="6" y="6" width="500" height="500" rx="98" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>

  <!-- Wordmark - textLength fixiert auf 400px -->
  <text x="256" y="276" text-anchor="middle"
        textLength="400" lengthAdjust="spacingAndGlyphs"
        font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="900" font-size="146" letter-spacing="-2">
    <tspan fill="#ffffff">MEINS</tspan><tspan fill="url(#m-red)">!</tspan>
  </text>

  <!-- Karierte Zielflagge -->
  <g transform="translate(106 314)" clip-path="url(#m-band-clip)">
    <rect width="300" height="40" fill="#ffffff"/>
    <g fill="#0a0a0a">
      <rect x="0"   y="0"  width="25" height="20"/>
      <rect x="50"  y="0"  width="25" height="20"/>
      <rect x="100" y="0"  width="25" height="20"/>
      <rect x="150" y="0"  width="25" height="20"/>
      <rect x="200" y="0"  width="25" height="20"/>
      <rect x="250" y="0"  width="25" height="20"/>
      <rect x="25"  y="20" width="25" height="20"/>
      <rect x="75"  y="20" width="25" height="20"/>
      <rect x="125" y="20" width="25" height="20"/>
      <rect x="175" y="20" width="25" height="20"/>
      <rect x="225" y="20" width="25" height="20"/>
      <rect x="275" y="20" width="25" height="20"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="256" y="408" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800" font-size="30" fill="#9a9a9a" letter-spacing="8">
    DAS AUTOSPIEL
  </text>
</svg>
